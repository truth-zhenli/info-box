<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📰 文献追踪 - 碎片化信息盒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f0eb;color:#333;line-height:1.8;padding:30px 20px}
.container{max-width:1100px;margin:0 auto}

/* 头部 */
.header{background:linear-gradient(135deg,#006064 0%,#00897b 100%);color:#fff;padding:24px 28px;border-radius:14px;margin-bottom:20px}
.header h1{font-size:22px;font-weight:700}
.header .sub{font-size:13px;opacity:.7;margin-top:4px}

/* 导航 */
.nav-bar{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.nav-link{display:inline-block;padding:5px 11px;border-radius:6px;font-size:12.5px;text-decoration:none;color:#555;transition:all .15s;white-space:nowrap}
.nav-link:hover{background:#eef2f7;color:#1a1a2e}
.nav-link.active{background:#006064;color:#fff;font-weight:600}

/* 年份标题 */
.year-title{font-size:20px;font-weight:700;color:#006064;margin:14px 0 10px;display:flex;align-items:center;gap:10px}
.year-title small{font-size:13px;font-weight:400;color:#999;opacity:.8}

/* 季度四列布局 */
.quarter-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:10px}
.quarter-col{display:flex;flex-direction:column;gap:8px}
.quarter-label{font-size:13px;font-weight:700;color:#006064;text-align:center;padding:4px;background:#e0f2f1;border-radius:8px 8px 0 0;margin-bottom:2px}

/* 月份卡片 - Hover触发日历 */
.month-card-wrap{position:relative}
.month-card{background:#fff;border-radius:10px;padding:14px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;text-align:center;border:2px solid #f0f0f0}
.month-card:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.1)}
.month-card.has-data{background:linear-gradient(135deg,#e0f2f1,#b2dfdb);border-color:#00897b}
.month-card.no-data{background:#fafafa;color:#ccc;cursor:default;border-color:#eee}
.month-card .month-name{font-size:14px;font-weight:600}
.month-card .month-count{font-size:11px;color:#888;margin-top:3px}
.month-card.has-data .month-count{color:#006064;font-weight:600}

/* 弹出日历 - hover触发 */
.cal-popup{display:none;position:absolute;z-index:100;top:100%;left:0;right:0;width:100%;padding:10px 8px;padding-top:8px;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.15);border:1px solid #e0e0e0;box-sizing:border-box}
.month-card-wrap:hover .cal-popup{display:block}
.cal-popup::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:12px;height:12px;background:#fff;border-left:1px solid #e0e0e0;border-top:1px solid #e0e0e0}
.cal-popup .cal-month-label{font-size:12px;font-weight:700;color:#006064;text-align:center;margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-header{text-align:center;font-size:9px;color:#999;padding:2px 0;font-weight:600}
.cal-day{text-align:center;padding:3px 0;font-size:11px;border-radius:4px;cursor:default;color:#ccc;min-height:22px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.cal-day.has-data{background:#e0f2f1;color:#006064;font-weight:600;cursor:pointer}
.cal-day.has-data:hover{background:#00897b;color:#fff;transform:scale(1.15)}
.cal-day.today{background:#ff7043;color:#fff;font-weight:700;box-shadow:0 1px 4px rgba(255,112,67,.4)}
.cal-day.today.has-data{background:#ff7043;color:#fff}
.cal-day.empty{background:transparent;cursor:default}
.cal-day.other-month{color:#f0f0f0}

/* 季度精选入口 */
.fav-entry{display:block;background:linear-gradient(135deg,#fff8e1,#ffecb3);border:2px solid #f5a623;border-radius:10px;padding:12px 8px;text-align:center;text-decoration:none;color:#e65100;font-size:13px;font-weight:600;transition:all .2s;margin-top:4px}
.fav-entry:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.1);background:linear-gradient(135deg,#ffe082,#ffd54f)}
.fav-entry .count{font-size:11px;font-weight:400;opacity:.7;display:block;margin-top:2px}

/* 页脚 */
.footer{text-align:center;color:#bbb;font-size:12px;margin-top:36px}

@media (max-width:800px){
  .quarter-row{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:480px){
  body{padding:12px 10px}
  .quarter-row{grid-template-columns:repeat(2,1fr);gap:6px}
  .month-card{padding:10px 6px}
  .header{padding:16px 18px;border-radius:10px;margin-bottom:14px}
  .header h1{font-size:18px}
  .nav-bar{padding:8px 6px;gap:2px;border-radius:8px}
  .nav-link{padding:6px 8px;font-size:11px}
  .quarter-label{font-size:11px}
  .cal-popup{left:auto;right:50%;transform:translateX(50%)}
}
</style>
</head>

<script>
/* ========== 数据：日期 → 文献信息 ========== */
const DATA = [
  {date:"2026-06-27", title:"NaDES沥青质解聚降粘·ML-LiS电池·ML镁合金·乳化-泡沫MD·碳负极MD·Zn-Ni添加剂DFT/MD", link:"papers/2026/06/2026-06-27.html", desc:"3专题", papers:6},
  {date:"2026-06-25", title:"稠油热复合驱·ML复合材料·热储能优化·DFT超敏性·Fourier-KAGAT·HDPE氢渗透·煤孔隙", link:"papers/2026/06/2026-06-25.html", desc:"3专题", papers:7},
  {date:"2026-06-23", title:"MTF·CSS交替·选层注汽·沥青质解聚·ChronoCast·ML-MD协同·电池ML·DP势PE热解·HKUST-1介电MD·G4C2 RNA折叠MD", link:"papers/2026/06/2026-06-23.html", desc:"4专题", papers:9},
  {date:"2026-06-21", title:"CSHSS稠油·CSS→SAGD·POSS降粘剂·模拟引导DL·VASt高熵合金·ML双钙钛矿·多尺度ML·复合液滴MD·近临界流体·溶剂交换·MD酶设计", link:"papers/2026/06/2026-06-21.html", desc:"4专题", papers:11},
  {date:"2026-06-20", title:"ML预测聚碳酸酯Tg·深度势能Mg-La腐蚀·PU-沥青MD·金基底润滑MD", link:"papers/2026/06/2026-06-20.html", desc:"2专题", papers:4},
  {date:"2026-06-18", title:"主动学习Al-Li合金·ML疲劳多尺度·形核Metadynamics·超疏液涂层CMD·TREM2 MD综述·药物重定位Benfotiamine", link:"papers/2026/06/2026-06-18.html", desc:"3专题", papers:6},
  {date:"2026-06-16", title:"稠油蒸汽吞吐剩余油·表面活性剂煤润湿MD·ML气敏材料·ML电极·MD散热PCM·MOF水MD·百草枯吸附MD·超级电容MD·药物MD", link:"papers/2026/06/2026-06-16.html", desc:"4专题", papers:9},
  {date:"2026-06-15", title:"重油液滴壁面CLSVOF·ML激光AM·ML储氢·ML 2D色心·ML高熵合金·AI Agent MOF氡·ML+MD葡萄糖", link:"papers/2026/06/2026-06-15.html", desc:"2专题", papers:7},
  {date:"2026-06-13", title:"沥青质吸附方解石·底水稠油夹层·TDA材料ML·页岩气分子模拟·pH螺旋肽MD", link:"papers/2026/06/2026-06-13.html", desc:"3专题", papers:5},
  {date:"2026-06-11", title:"稠油降粘驱油·多相泵稠油·AFM-net·DL铁电成像·ML储氢·ML CO2还原·LM-DEM·MD界面热阻·MD结晶", link:"papers/2026/06/2026-06-11.html", desc:"3专题", papers:9},
  {date:"2026-06-10", title:"CO2 WAG沥青质·AI蛋白质观测·PRECEDE药物·MOF/ML/MD·聚合物自动化·煤阶吸附·AlphaFold+MD", link:"papers/2026/06/2026-06-10.html", desc:"4专题", papers:7},
  {date:"2026-06-09", title:"稠油驱替·ML力竞争·数字岩石·Heusler磁热·铁基ML·MATAI合金·神经符号溶剂·Darcy代理·MOF/ML·ReaxFF氧化", link:"papers/2026/06/2026-06-09.html", desc:"3专题", papers:9},
  {date:"2026-06-08", title:"烟道气辅助注蒸汽 · TrussGPT · AdsorbSample · Si-Ge热输运 · Shenfu半焦MD", link:"papers/2026/06/2026-06-08.html", desc:"3专题", papers:5},
  {date:"2026-06-05", title:"MD CO2溶解 · IRM稠油 · 注汽CO2 · Retro-Forge · CGCNN-Eb · BiL-AttNet · 2D-ML · MOF-ML · Bcl-2", link:"papers/2026/06/2026-06-05.html", desc:"4专题", papers:9},
  {date:"2026-06-04", title:"ML肽材料设计 · ML电催化水分解 · ML增材制造 · MD海泡石脱水", link:"papers/2026/06/2026-06-04.html", desc:"2专题", papers:4},
  {date:"2026-06-02", title:"MD润湿性 · NeuralSCF-DFT · ML氨合成 · 贝叶斯优化 · PatchTST · HM-壳聚糖 · MPNICE · 贝叶斯Tg · KBKit", link:"papers/2026/06/2026-06-02.html", desc:"3专题", papers:9},
  {date:"2026-05-31", title:"晶体生成设计 · 界面ML · MD模拟渣结构", link:"papers/2026/05/2026-05-31.html", desc:"3专题", papers:7},
  {date:"2026-05-30", title:"稠油CO2控水 · AI+MD · 机器学习", link:"papers/2026/05/2026-05-30.html", desc:"3专题", papers:4},
  {date:"2026-05-29", title:"稠油催化改质 · 机器学习 · 分子动力学 · 计算生物", link:"papers/2026/05/2026-05-29.html", desc:"4专题", papers:6},
  {date:"2026-05-26", title:"人工智能 · 分子模拟 · 稠油开采", link:"papers/2026/05/2026-05-26.html", desc:"4专题", papers:10},
  {date:"2026-05-25", title:"稠油开采装备优化 · 数值模拟", link:"papers/2026/05/2026-05-25.html", desc:"稠油装备", papers:2},
  {date:"2026-05-24", title:"人工智能 · 分子模拟 · 油田化学", link:"papers/2026/05/2026-05-24.html", desc:"3专题", papers:7},
  {date:"2026-05-22", title:"计算材料学 · 人工智能 · 分子模拟", link:"papers/2026/05/2026-05-22.html", desc:"4专题", papers:13},
];

const QUARTERS = [
  {q:1, label:'一季度', months:[1,2,3], emoji:'🌸', color:'#e91e63'},
  {q:2, label:'二季度', months:[4,5,6], emoji:'☀️', color:'#ff6f00'},
  {q:3, label:'三季度', months:[7,8,9], emoji:'🍂', color:'#2e7d32'},
  {q:4, label:'四季度', months:[10,11,12], emoji:'❄️', color:'#1565c0'}
];
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAY_NAMES = ['日','一','二','三','四','五','六'];

/* 构建日期→数据映射 */
var dateMap = {};
DATA.forEach(function(d){ dateMap[d.date] = d; });

/* 获取今天日期 */
var today = new Date();
var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

function renderCalendar(year, month){
  var firstDay = new Date(parseInt(year), month-1, 1).getDay();
  var daysInMonth = new Date(parseInt(year), month, 0).getDate();
  var html = '<div class="cal-grid">';
  DAY_NAMES.forEach(function(dn){ html += '<div class="cal-header">' + dn + '</div>'; });
  for(var e = 0; e < firstDay; e++){ html += '<div class="cal-day empty"></div>'; }
  for(var d = 1; d <= daysInMonth; d++){
    var dateStr = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var hasData = dateMap[dateStr] ? true : false;
    var isToday = (dateStr === todayStr);
    var cls = 'cal-day';
    if(hasData) cls += ' has-data';
    if(isToday) cls += ' today';
    if(!hasData && !isToday) cls += ' empty';
    var extra = '';
    if(hasData && dateMap[dateStr]){
      extra = ' onclick="window.location.href=\'' + dateMap[dateStr].link + '\'" title="' + dateMap[dateStr].title.replace(/'/g,'') + ' · ' + dateMap[dateStr].papers + '篇"';
    } else if(isToday){
      extra = ' title="今天"';
    }
    html += '<div class="' + cls + '"' + extra + '>' + d + '</div>';
  }
  html += '</div>';
  return html;
}

function render(){
  var root = document.getElementById('year-view');
  var html = '';

  var years = {};
  DATA.forEach(function(d){
    var y = d.date.slice(0,4);
    if(!years[y]) years[y] = [];
    years[y].push(d);
  });

  Object.keys(years).sort().reverse().forEach(function(year){
    var yearData = years[year];
    html += '<div class="year-title">' + year + '年 <small>共 ' + yearData.length + ' 期</small></div>';

    var byMonth = {};
    yearData.forEach(function(d){
      var m = parseInt(d.date.slice(5,7));
      if(!byMonth[m]) byMonth[m] = [];
      byMonth[m].push(d);
    });

    html += '<div class="quarter-row">';

    QUARTERS.forEach(function(q){
      html += '<div class="quarter-col">';
      html += '<div class="quarter-label">' + q.emoji + ' ' + q.label + '</div>';

      q.months.forEach(function(m){
        var items = byMonth[m] || [];
        var hasData = items.length > 0;
        var cls = hasData ? 'month-card has-data' : 'month-card no-data';

        html += '<div class="month-card-wrap">';
        html += '<div class="' + cls + '" data-year="' + year + '" data-month="' + m + '">';
        html += '<div class="month-name">' + MONTH_NAMES[m-1] + '</div>';
        if(hasData){
          var totalPapers = items.reduce(function(sum, d){ return sum + (d.papers || 0); }, 0);
          html += '<div class="month-count">' + items.length + '期 · ' + totalPapers + '篇</div>';
        } else {
          html += '<div class="month-count">—</div>';
        }
        html += '</div>'; /* month-card */

        /* 弹出日历（hover触发） */
        if(hasData){
          html += '<div class="cal-popup">';
          html += '<div class="cal-month-label">' + year + '年 ' + MONTH_NAMES[m-1] + '</div>';
          html += renderCalendar(year, m);
          html += '</div>'; /* cal-popup */
        }

        html += '</div>'; /* month-card-wrap */
      });

      /* 季度精选入口 */
      html += '<a class="fav-entry" href="' + year + '/q' + q.q + '.html?v=202605261146" target="_blank">';
      html += '★ ' + q.label + '精选';
      html += '<span class="count" data-year="' + year + '" data-q="' + q.q + '">加载中...</span>';
      html += '</a>';

      html += '</div>'; /* quarter-col */
    });

    html += '</div>'; /* quarter-row */
  });

  root.innerHTML = html;
  updateFavCounts();
}

/* ========== 收藏统计 ========== */
function updateFavCounts(){
  /* 预渲染收藏计数（由 gen_quarterly.py 更新） */
  var PRERENDERED_COUNTS = {2026:{1:0,2:7,3:0,4:0}};
  updateUI(PRERENDERED_COUNTS);

  /* 再从线上 favorites.json 同步（跨设备，兼容file://和https://） */
  function loadFavCount(){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '../favorites.json?_=' + Date.now(), true);
    xhr.overrideMimeType('application/json');
    xhr.onload = function(){
      if(xhr.status === 0 || xhr.status === 200){
        try{
          var all = JSON.parse(xhr.responseText);
          var counts = {};
          all.forEach(function(p){
            if(!p.starred || !p.date) return;
            var y = p.date.slice(0,4);
            var m = parseInt(p.date.slice(5,7));
            var q = m <= 3 ? 1 : m <= 6 ? 2 : m <= 9 ? 3 : 4;
            if(!counts[y]) counts[y] = {};
            if(!counts[y][q]) counts[y][q] = 0;
            counts[y][q]++;
          });
          updateUI(counts);
        }catch(e){}
      }
    };
    xhr.send();
  }
  loadFavCount();
}

function countFromLocalStorage(){
  var qCounts = {1:0, 2:0, 3:0, 4:0};
  for(var i = 0; i < localStorage.length; i++){
    var key = localStorage.key(i);
    if(key && key.startsWith('fav_')){
      try{
        var val = JSON.parse(localStorage.getItem(key));
        if(val && val.date){
          var m = parseInt(val.date.slice(5,7));
          var q = m <= 3 ? 1 : m <= 6 ? 2 : m <= 9 ? 3 : 4;
          qCounts[q]++;
        }
      }catch(e){}
    }
  }
  updateUI(qCounts);
}

function updateUI(counts){
  document.querySelectorAll('.fav-entry .count').forEach(function(el){
    var y = el.dataset.year;
    var q = parseInt(el.dataset.q);
    var c = (counts[y] && counts[y][q]) || 0;
    el.textContent = c > 0 ? '★ ' + c + '篇' : '暂无收藏';
    if(c > 0) el.style.color = '#e65100';
  });
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
