<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📰 文献追踪 - 碎片化信息盒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f0eb;color:#333;line-height:1.8;padding:30px 20px}
.container{max-width:1100px;margin:0 auto}

/* 头部 */
.header{background:linear-gradient(135deg,#006064 0%,#00897b 100%);color:#fff;padding:24px 28px;border-radius:14px;margin-bottom:20px}
.header h1{font-size:22px;font-weight:700}
.header .sub{font-size:13px;opacity:.7;margin-top:4px}

/* 导航 */
.nav-bar{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.nav-link{display:inline-block;padding:5px 11px;border-radius:6px;font-size:12.5px;text-decoration:none;color:#555;transition:all .15s;white-space:nowrap}
.nav-link:hover{background:#eef2f7;color:#1a1a2e}
.nav-link.active{background:#006064;color:#fff;font-weight:600}

/* 年份标题 */
.year-title{font-size:20px;font-weight:700;color:#006064;margin:14px 0 10px;display:flex;align-items:center;gap:10px}
.year-title small{font-size:13px;font-weight:400;color:#999;opacity:.8}

/* 季度四列布局 */
.quarter-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:10px}
.quarter-col{display:flex;flex-direction:column;gap:8px}
.quarter-label{font-size:13px;font-weight:700;color:#006064;text-align:center;padding:4px;background:#e0f2f1;border-radius:8px 8px 0 0;margin-bottom:2px}

.month-card{background:#fff;border-radius:10px;padding:14px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;text-align:center;border:2px solid #f0f0f0}
.month-card:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.1)}
.month-card.has-data{background:linear-gradient(135deg,#e0f2f1,#b2dfdb);border-color:#00897b}
.month-card.no-data{background:#fafafa;color:#ccc;cursor:default;border-color:#eee}
.month-card .month-name{font-size:14px;font-weight:600}
.month-card .month-count{font-size:11px;color:#888;margin-top:3px}
.month-card.has-data .month-count{color:#006064;font-weight:600}

/* 季度精选入口 */
.fav-entry{display:block;background:linear-gradient(135deg,#fff8e1,#ffecb3);border:2px solid #f5a623;border-radius:10px;padding:12px 8px;text-align:center;text-decoration:none;color:#e65100;font-size:13px;font-weight:600;transition:all .2s;margin-top:4px}
.fav-entry:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.1);background:linear-gradient(135deg,#ffe082,#ffd54f)}
.fav-entry .count{font-size:11px;font-weight:400;opacity:.7;display:block;margin-top:2px}

/* 每日展开 */
.month-days{display:none;background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.month-days.open{display:block}
.day-item{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f0f0f0;gap:8px}
.day-item:last-child{border-bottom:none}
.day-badge{display:inline-block;background:#e0f2f1;color:#006064;padding:2px 10px;border-radius:5px;font-size:11px;font-weight:600;min-width:44px;text-align:center}
.day-link{color:#2980b9;text-decoration:none;font-size:13px;flex:1}
.day-link:hover{color:#e74c3c;text-decoration:underline}
.day-desc{font-size:11px;color:#999;flex-shrink:0;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-fav{font-size:12px;color:#f5a623;min-width:16px;text-align:center}

/* 页脚 */
.footer{text-align:center;color:#bbb;font-size:12px;margin-top:30px}
.visitor-badge{display:inline-block;margin-top:6px;font-size:11px;color:#ccc}
.visitor-badge img{vertical-align:middle;border-radius:4px}

/* ===== 移动端 ===== */
@media (max-width: 800px){
  .quarter-row{grid-template-columns:repeat(2,1fr)}
  .day-desc{max-width:100px}
}
@media (max-width: 480px){
  body{padding:12px 10px}
  .quarter-row{grid-template-columns:repeat(2,1fr);gap:6px}
  .month-card{padding:10px 6px}
  .header{padding:16px 18px;border-radius:10px;margin-bottom:14px}
  .header h1{font-size:18px}
  .nav-bar{padding:8px 6px;gap:2px;border-radius:8px}
  .nav-link{padding:6px 8px;font-size:11px}
  .day-desc{display:none}
  .quarter-label{font-size:11px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>📰 文献追踪</h1>
  <div class="sub">按季度查看 · 点击月份展开每日列表 · ☆收藏好文章 · ★自动进入季度精选</div>
</div>
<div class="nav-bar">
  <a class="nav-link" href="../碎片化信息盒.html">🏠 首页</a>
  <a class="nav-link " href="科研动态.html">🔬 科研动态</a>
  <a class="nav-link " href="学术知识.html">📖 学术知识</a>
  <a class="nav-link " href="国际形势.html">🌍 国际形势</a>
  <a class="nav-link " href="人生感悟.html">💭 人生感悟</a>
  <a class="nav-link " href="实用小妙招.html">🛠️ 小妙招</a>
  <a class="nav-link active" href="文献追踪.html">📰 文献追踪</a>
  <a class="nav-link " href="其他.html">📌 其他</a>
</div>

<div id="year-view"></div>

<div class="footer">
  📬 每天6:00自动推送 · 看到好文章点☆收藏，自动进入季度精选
  <div class="visitor-badge"><img src="https://visitor-badge.laobi.icu/badge?page_id=truth-zhenli.info-box" alt="访客"></div>
</div>
</div>

<script>
/* ========== 数据 ========== */
const DATA = [
  {date:"2026-05-22", title:"稠油致粘/降粘机理 + 乳化液聚并 + 机器学习", link:"../文献追踪/2026-05-22.html", desc:"16篇·4专题"},

];

/* 季度定义 */
const QUARTERS = [
  {q:1, label:'一季度', months:[1,2,3], emoji:'🌸', color:'#e91e63'},
  {q:2, label:'二季度', months:[4,5,6], emoji:'☀️', color:'#ff6f00'},
  {q:3, label:'三季度', months:[7,8,9], emoji:'🍂', color:'#2e7d32'},
  {q:4, label:'四季度', months:[10,11,12], emoji:'❄️', color:'#1565c0'}
];
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

/* ========== 渲染 ========== */
function render(){
  const root = document.getElementById('year-view');
  let html = '';

  // 按年份分组
  const years = {};
  DATA.forEach(d => {
    const y = d.date.slice(0,4);
    if(!years[y]) years[y] = [];
    years[y].push(d);
  });

  Object.keys(years).sort().reverse().forEach(year => {
    const yearData = years[year];
    html += `<div class="year-title">${year}年 <small>共 ${yearData.length} 期</small></div>`;

    // 按月份统计
    const byMonth = {};
    yearData.forEach(d => {
      const m = parseInt(d.date.slice(5,7));
      if(!byMonth[m]) byMonth[m] = [];
      byMonth[m].push(d);
    });

    html += '<div class="quarter-row">';

    QUARTERS.forEach(q => {
      html += '<div class="quarter-col">';
      html += `<div class="quarter-label">${q.emoji} ${q.label}</div>`;

      // 该季度三个月
      q.months.forEach(m => {
        const items = byMonth[m] || [];
        const hasData = items.length > 0;
        const cls = hasData ? 'month-card has-data' : 'month-card no-data';
        html += `<div class="${cls}" data-year="${year}" data-month="${m}">`;
        html += `<div class="month-name">${MONTH_NAMES[m-1]}</div>`;
        if(hasData){
          const totalPapers = items.reduce((sum, d) => {
            const match = d.desc && d.desc.match(/(\d+)篇/);
            return sum + (match ? parseInt(match[1]) : 0);
          }, 0);
          html += `<div class="month-count">${items.length}期 · ${totalPapers}篇</div>`;
        } else {
          html += `<div class="month-count">—</div>`;
        }
        html += '</div>';
      });

      // 季度精选入口
      html += `<a class="fav-entry" href="${q.q}季度精选.html" target="_blank">`;
      html += `★ ${q.label}精选`;
      html += `<span class="count" data-q="${q.q}">加载中...</span>`;
      html += `</a>`;

      html += '</div>'; // quarter-col
    });

    html += '</div>'; // quarter-row

    // 每个月份的展开区域
    for(let m = 1; m <= 12; m++){
      const items = byMonth[m] || [];
      if(items.length === 0) continue;
      html += `<div class="month-days" data-year="${year}" data-month="${m}">`;
      items.sort((a,b) => b.date.localeCompare(a.date)).forEach(d => {
        const day = d.date.slice(5);
        html += `<div class="day-item">`;
        html += `<span class="day-badge">${day}</span>`;
        html += `<a class="day-link" href="${d.link}" target="_blank">${d.title}</a>`;
        html += `<span class="day-desc">${d.desc || ''}</span>`;
        html += `<span class="day-fav" data-date="${d.date}"></span>`;
        html += `</div>`;
      });
      html += '</div>';
    }
  });

  root.innerHTML = html;

  // 更新收藏统计
  updateFavCounts();
}

/* ========== 月份点击展开 ========== */
document.addEventListener('click', function(e){
  const card = e.target.closest('.month-card');
  if(!card || card.classList.contains('no-data')) return;
  const year = card.dataset.year;
  const month = card.dataset.month;
  const target = document.querySelector(`.month-days[data-year="${year}"][data-month="${month}"]`);
  if(!target) return;
  const isOpen = target.classList.contains('open');
  document.querySelectorAll('.month-days.open').forEach(el => el.classList.remove('open'));
  if(!isOpen) target.classList.add('open');
});

/* ========== 收藏统计 ========== */
function updateFavCounts(){
  // 统计每个季度的收藏数
  const qCounts = {1:0, 2:0, 3:0, 4:0};

  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    if(key && key.startsWith('fav_')){
      try{
        const val = JSON.parse(localStorage.getItem(key));
        if(val && val.date){
          // 从日期判断所属季度
          const m = parseInt(val.date.slice(5,7));
          const q = m <= 3 ? 1 : m <= 6 ? 2 : m <= 9 ? 3 : 4;
          qCounts[q]++;
        }
      }catch(e){}
    }
  }

  document.querySelectorAll('.fav-entry .count').forEach(el => {
    const q = parseInt(el.dataset.q);
    const c = qCounts[q] || 0;
    el.textContent = c > 0 ? `★ ${c}篇` : '暂无收藏';
    if(c > 0) el.style.color = '#e65100';
  });

  // 每日收藏标识
  document.querySelectorAll('.day-fav').forEach(el => {
    const date = el.dataset.date;
    let count = 0;
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('fav_')){
        try{
          const val = JSON.parse(localStorage.getItem(key));
          if(val && val.date && val.date === date) count++;
        }catch(e){}
      }
    }
    el.textContent = count > 0 ? '★' : '';
  });
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
