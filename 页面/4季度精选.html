<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❄️ 四季度精选 - 碎片化信息盒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f0eb;color:#333;line-height:1.8;padding:30px 20px}
.container{max-width:900px;margin:0 auto}
.header{background:linear-gradient(135deg,#0d47a1 0%,#1565c0 100%);color:#fff;padding:22px 26px;border-radius:14px;margin-bottom:18px}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:13px;opacity:.7;margin-top:3px}

.nav-bar{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.nav-link{display:inline-block;padding:5px 10px;border-radius:6px;font-size:12px;text-decoration:none;color:#555;transition:all .15s;white-space:nowrap}
.nav-link:hover{background:#eef2f7;color:#1a1a2e}
.nav-link.active{background:#0d47a1;color:#fff;font-weight:600}

.empty-tip{text-align:center;color:#ccc;font-size:14px;padding:60px 0}
.empty-tip .big{font-size:48px;display:block;margin-bottom:12px}

.paper-card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid #1565c0}
.paper-title{font-size:14px;font-weight:600;color:#0f3460;margin-bottom:4px}
.paper-title a{color:#0f3460;text-decoration:none}
.paper-title a:hover{text-decoration:underline}
.paper-meta{font-size:11px;color:#888;margin-bottom:4px;display:flex;flex-wrap:wrap;gap:4px}
.meta-tag{display:inline-block;background:#fce4ec;color:#0d47a1;padding:2px 8px;border-radius:8px;font-size:11px}
.paper-authors{font-size:11px;color:#999;margin-bottom:2px}
.paper-date{font-size:11px;color:#aaa}
.paper-source{font-size:11px;color:#bbb;margin-top:4px}
.paper-source a{color:#2980b9;text-decoration:none}
.paper-source a:hover{text-decoration:underline}

.footer{text-align:center;color:#ccc;font-size:12px;margin-top:30px}
.visitor-badge{display:inline-block;margin-top:6px;font-size:11px;color:#ccc}
.visitor-badge img{vertical-align:middle;border-radius:4px}

@media (max-width:480px){
  body{padding:12px 10px}
  .header{padding:16px 16px}
  .header h1{font-size:17px}
  .nav-bar{padding:8px 6px}
  .nav-link{font-size:11px;padding:5px 7px}
  .paper-card{padding:14px 14px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>❄️ 四季度精选</h1>
  <div class="sub">10月 · 11月 · 12月 — 你收藏的好文章</div>
</div>
<div class="nav-bar">
  <a class="nav-link" href="../碎片化信息盒.html">🏠 首页</a>
  <a class="nav-link" href="文献追踪.html">📰 文献追踪</a>
  <a class="nav-link active" href="1季度精选.html" class="nav-link">🌸 Q1</a>
  <a class="nav-link" href="2季度精选.html">☀️ Q2</a>
  <a class="nav-link" href="3季度精选.html">🍂 Q3</a>
  <a class="nav-link" href="4季度精选.html" class="nav-link active">❄️ Q4</a>
</div>

<div id="list"></div>

<div class="footer">
  在文献页面点★收藏，文章会自动出现在这里
  </div>
</div>

<script>
(function(){
  var quarter = 4; // Q4: Month 10-12
  var listEl = document.getElementById('list');
  var papers = [];

  for(var i = 0; i < localStorage.length; i++){
    var key = localStorage.key(i);
    if(key && key.startsWith('fav_')){
      try{
        var val = JSON.parse(localStorage.getItem(key));
        if(val && val.date){
          var m = parseInt(val.date.slice(5,7));
          if(m >= 10 && m <= 12){
            papers.push(val);
          }
        }
      }catch(e){}
    }
  }

  if(papers.length === 0){
    listEl.innerHTML = '<div class="empty-tip"><span class="big">🌟</span>还没有收藏的文章<br>在文献阅读页面点击☆收藏，就会出现在这里</div>';
    return;
  }

  // 按日期排序（最新在前）
  papers.sort(function(a,b){ return b.date.localeCompare(a.date); });

  var html = '';
  papers.forEach(function(p){
    html += '<div class="paper-card">';
    html += '<div class="paper-title"><a href="' + p.link + '" target="_blank">' + p.title + '</a></div>';
    if(p.cnTitle) html += '<div class="paper-meta"><span class="meta-tag">' + p.journal + '</span></div>';
    if(p.authors) html += '<div class="paper-authors">' + p.authors + '</div>';
    html += '<div class="paper-date">📅 ' + p.date + '</div>';
    html += '<div class="paper-source">🔗 <a href="' + p.link + '" target="_blank">' + p.link.replace(/https?:\/\//,'').slice(0,60) + '...</a></div>';
    html += '</div>';
  });

  listEl.innerHTML = html;
})();
</script>
</body>
</html>
