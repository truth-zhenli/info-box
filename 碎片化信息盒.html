<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f0eb;color:#333;line-height:1.8;padding:30px 20px
}
.container{max-width:880px;margin:0 auto}@media(min-width:1100px){.container{max-width:960px}}

/* Banner */
.banner{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  color:#fff;padding:36px 30px 28px;border-radius:16px;margin-bottom:28px;
  text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.12);
  position:relative;overflow:hidden
}
.banner::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.03)
}
.banner::after{
  content:'';position:absolute;bottom:-60px;left:-30px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.02)
}
.banner-icon{font-size:48px;margin-bottom:6px;position:relative}
.banner h1{font-size:26px;font-weight:700;position:relative}
.banner .sub{font-size:14px;opacity:.65;margin-top:4px;position:relative}

.nav-bar{
  background:#fff;border-radius:10px;padding:10px 14px;
  margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);
  display:flex;flex-wrap:wrap;gap:3px;justify-content:center
}
.nav-link{
  display:inline-block;padding:5px 11px;border-radius:6px;
  font-size:12.5px;text-decoration:none;color:#555;
  transition:all .15s;white-space:nowrap
}
.nav-link:hover{background:#eef2f7;color:#1a1a2e}
.nav-link.active{background:#2c3e50;color:#fff;font-weight:600}

/* Cards */
.cards{display:flex;flex-direction:column;gap:12px}
.card{
  background:#fff;border-radius:12px;padding:18px 22px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);text-decoration:none;color:#333;
  display:flex;align-items:center;gap:14px;
  transition:all .2s;border:1px solid transparent
}
.card:hover{
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  transform:translateY(-2px);
  border-color:#ddd
}
.card-icon{font-size:30px;width:42px;text-align:center}
.card-info{flex:1}
.card-title{font-size:16px;font-weight:600}
.card-desc{font-size:13px;color:#999;margin-top:1px}
.card-arrow{font-size:18px;color:#ccc;transition:all .2s}
.card:hover .card-arrow{color:#0f3460;transform:translateX(4px)}

/* Card accent borders */
.card-research{border-left:4px solid #d32f2f}
.card-knowledge{border-left:4px solid #1a237e}
.card-world{border-left:4px solid #e65100}
.card-life{border-left:4px solid #7b1fa2}
.card-tips{border-left:4px solid #2e7d32}
.card-other{border-left:4px solid #78909c}

.footer{
  text-align:center;color:#bbb;font-size:12px;margin-top:36px;
  padding-top:20px;border-top:1px solid #e0d8d0
}
.footer b{color:#888}


/* ===== 移动端优化 ===== */
@media (max-width: 480px) {
  body { padding: 12px 10px; }
  .container { max-width: 100%; }
  
  /* Banner */
  .banner { padding: 24px 18px 20px; border-radius: 12px; margin-bottom: 18px; }
  .banner-icon { font-size: 36px; }
  .banner h1 { font-size: 20px; }
  .banner .sub { font-size: 12px; }
  
  /* Nav */
  .nav-bar { padding: 8px 6px; gap: 2px; border-radius: 8px; }
  .nav-link { padding: 6px 8px; font-size: 11px; }
  
  /* Cards */
  .card { padding: 14px 16px; border-radius: 10px; gap: 10px; }
  .card-icon { font-size: 24px; width: 34px; }
  .card-title { font-size: 14px; }
  .card-desc { font-size: 12px; }
  .card-arrow { font-size: 15px; }
  
  .footer { font-size: 11px; margin-top: 24px; }
}

@media (max-width: 360px) {
  .nav-bar { flex-direction: column; align-items: stretch; }
  .nav-link { text-align: center; }
}
